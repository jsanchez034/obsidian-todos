schema: spec-driven

context: |
  ## Agent-skills activation protocol (READ FIRST)

  This project integrates the agent-skills@addy-agent-skills plugin. EVERY
  task tagged with `(skill-name PHASE)` MUST activate that skill BEFORE any
  code edits. Order is strict: invoke → follow the skill's process → edit
  code. Never edit first.

  **How to activate a skill (in priority order):**
  1. Primary: call `Skill(skill="agent-skills:<name>")` and follow its steps.
  2. Fallback: use the Read tool on the SKILL.md path below. If `$HOME` does
     not resolve inside the Read tool, run `echo $HOME` via Bash first and
     Read the resolved absolute path.

  **Skill name → SKILL.md path (fallback for Read tool):**
