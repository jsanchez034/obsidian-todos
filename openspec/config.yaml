  ## Project basics

  Tech stack: See docs/architecture.md
  We use conventional commits
  Domain: Desktop productivity app (macOS menu bar markdown editor)
  Package manager: Bun (not npm/yarn/pnpm)
  Linter/formatter: Oxlint + Oxfmt (not ESLint/Prettier)

  ## Implementation workflow (agent-skills)

  The agent-skills plugin is installed. Tasks generated by OpenSpec must be
  implemented following these skill processes during opsx:apply.

  ### test-driven-development
  All new logic MUST follow the RED-GREEN-REFACTOR cycle:
    1. RED — Write a failing test that describes the expected behavior
    2. GREEN — Write the minimum code to make the test pass
    3. REFACTOR — Clean up while keeping tests green
  For bug fixes, use the Prove-It pattern: write a test that reproduces the
  bug (must FAIL), then fix it (test PASSES), then run full suite.

  ### incremental-implementation
  Build in thin vertical slices. For each slice:
    1. Implement the smallest complete piece of functionality
    2. Test — run the test suite
    3. Verify — confirm the slice works (tests pass, build succeeds)
    4. Commit — save progress with a descriptive message
  Each increment must leave the system in a working, testable state.
  Never write more than ~100 lines before running tests.

  ### code-review-and-quality
  Review across five axes: correctness, readability, architecture,
  security, performance. Categorize findings as Critical, Important,
  or Suggestion with specific file:line references.

  ### Additional skills applied as needed
    - frontend-ui-engineering (WCAG 2.1 AA, component architecture)
    - api-and-interface-design (contract-first, Hyrum's Law)
    - security-and-hardening (OWASP Top 10, input validation)
    - performance-optimization (measure first, Core Web Vitals)
    - debugging-and-error-recovery (reproduce, localize, fix, guard)
    - git-workflow-and-versioning (atomic commits, trunk-based dev)
    - documentation-and-adrs (ADRs for architectural decisions)
    - code-simplification (reduce complexity, preserve behavior)

rules:
  proposal:
    - Include a "Skills needed" section listing which agent-skills apply by name (e.g. test-driven-development, incremental-implementation, code-review-and-quality)
    - Identify security, performance, or accessibility concerns that need specialized skills (security-and-hardening, performance-optimization, frontend-ui-engineering)

  specs:
    - Write testable acceptance criteria as scenarios that can become failing tests before implementation (per test-driven-development)
    - Use Given/When/Then format for behavioral specs
    - Flag UI specs with accessibility requirements for frontend-ui-engineering
    - Reference existing patterns in the codebase before inventing new ones

  design:
    - Include an "Implementation approach" section mapping each phase to an agent-skill by name and its process step (e.g. "test-driven-development RED", "incremental-implementation")
    - The implementation approach MUST follow TDD ordering — test phases (RED) come before implementation phases (GREEN)
    - Flag security considerations for security-and-hardening review
    - Flag performance-sensitive areas for performance-optimization
    - Reference existing utilities and shared packages before creating new ones

  tasks:
    - "CRITICAL: Follow test-driven-development ordering. For every module with testable logic, the RED task (write failing tests) MUST come before the GREEN task (implement code to pass tests). Never generate implementation tasks before their corresponding test tasks."
    - Each task must describe the actual process to follow, not just what to build. Include the TDD phase in the task description (e.g. "Write failing unit tests for X — tests must fail since X does not exist yet" for RED, "Implement X with minimum code to make all tests pass" for GREEN).
    - 'Each task MUST begin with "Invoke Skill agent-skills:<name>, then ..." where <name> is the applicable skill. End the task description with the parenthesized tag `(skill-name PHASE)` and a concrete `Verify:` command. Example: "Invoke Skill agent-skills:test-driven-development, then write failing unit tests for config.loadConfig covering theme validation. (test-driven-development RED) Verify: `bun run test` shows the new tests failing."'
    - 'The inline invocation ("Invoke Skill agent-skills:<name>") is non-negotiable — do not emit tasks that only include the parenthesized tag, because tags alone have been observed to be ignored during /opsx:apply.'
    - Each task is a thin vertical slice per incremental-implementation — implement, test, verify, commit
    - 'Every task must end with a concrete runnable verification (e.g. "Verify: bun run test passes" or "Verify: bun run check-types passes"), not vague checks like "type-check passes"'
    - Order tasks by dependency, with each task independently verifiable and leaving the system in a working state

  apply:
    - 'CRITICAL: Before executing ANY task, parse the `(skill-name PHASE)` tag in the task description and invoke the named skill via `Skill(skill="agent-skills:<name>")`. If the Skill tool call is not available, run `echo $HOME` via Bash to resolve the home directory, then Read `<HOME>/.claude/plugins/marketplaces/addy-agent-skills/skills/<name>/SKILL.md` and follow its process.'
    - 'Announce the invocation before editing code — e.g., "Activating agent-skills:test-driven-development for task 2.1" — so the user can see the skill was loaded. Do NOT jump straight to code edits.'
    - 'For (test-driven-development RED) tasks: write ONLY the failing test. Run the Verify command to confirm it fails. Do NOT write implementation code in a RED task.'
    - 'For (test-driven-development GREEN) tasks: write ONLY the minimum code to make the matching RED test pass. Do NOT add new test cases in a GREEN task.'
    - 'For (incremental-implementation) tasks: edit, then run the Verify command. Do not start the next task until the current Verify passes. Each slice must leave the system in a working state.'
    - 'For (code-review-and-quality) tasks: produce findings across all five axes (correctness, readability, architecture, security, performance) with file:line references and severity (Critical / Important / Suggestion).'
    - 'Never batch multiple tasks'' edits before verifying. Every task ends with its Verify command passing before the checkbox flips to [x].'
    - 'If implementation reveals a task is mis-tagged or the skill process cannot be followed as written, pause and suggest an artifact update (per openspec-apply-change Fluid Workflow Integration) instead of proceeding ad hoc.'
